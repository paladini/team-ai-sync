stages:
  - test
  - release

test:
  stage: test
  image: node:24
  script:
    - npm ci
    - npm run all

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG of team-ai-sync CI/CD components."
